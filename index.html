<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beleza Pura</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Roboto', sans-serif; margin: 0; background: #fff8f5; }
.banner { background: linear-gradient(135deg, #b85c5c, #d4a017); color: white; text-align: center; padding: 30px; }
.promo { background: #d4a017; color: white; text-align: center; padding: 10px; font-weight: bold; }
.urgencia { text-align: center; color: #b85c5c; margin: 5px; }
#catalogo { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
.produto { background: white; border-radius: 16px; margin: 10px; width: 240px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.produto img { width: 100%; height: 200px; object-fit: contain; border-radius: 10px; }
.nome { font-weight: bold; margin: 10px 0; }
.preco { color: #b85c5c; font-size: 20px; font-weight: bold; }
.botao-comprar { width: 100%; padding: 10px; border: none; border-radius: 20px; margin-top: 5px; cursor: pointer; }
.adicionar { background: #d4a017; color: white; }
.comprar-direto { background: #b85c5c; color: white; }
#icone-carrinho { position: fixed; top: 10px; right: 10px; background: #b85c5c; color: white; padding: 10px; border-radius: 20px; cursor: pointer; }
#carrinho { position: fixed; top: 50px; right: 10px; background: white; width: 260px; padding: 10px; border-radius: 10px; display: none; }
.qtd-btn { padding: 2px 6px; margin: 2px; cursor: pointer; }
#carrinho li { margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
@media (max-width:600px) { .produto { width: 90%; } }
</style>
</head>

<body>

<div class="banner"><h1>Beleza Pura</h1><p>Descubra sua beleza</p></div>
<div class="promo">🔥 TUDO 50% OFF 🔥</div>
<div class="urgencia">⚡ Aproveite hoje</div>

<div id="catalogo"></div>

<div id="icone-carrinho">🛒 <span id="contador">0</span></div>

<div id="carrinho">
<h3>Carrinho</h3>
<ul id="lista"></ul>
<p id="total"></p>

<label>Pagamento:</label>
<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<div id="parcelas-box" style="display:none">
<select id="parcelas">
<option value="1">1x</option>
<option value="2">2x</option>
<option value="3">3x</option>
<option value="6">6x</option>
</select>
</div>

<a id="whatsapp" target="_blank">Finalizar pedido no WhatsApp</a>
</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/14jIYmfNIoLSxvnBuHMByplsNXLtD_kC0WFlOmEYWwEk/gviz/tq?tqx=out:json&sheet=Nome";

let carrinho = [];
let total = 0;

const icone = document.getElementById("icone-carrinho");
const carrinhoDiv = document.getElementById("carrinho");
const lista = document.getElementById("lista");
const contador = document.getElementById("contador");
const whatsapp = document.getElementById("whatsapp");

icone.onclick = () => {
  carrinhoDiv.style.display = carrinhoDiv.style.display === 'block' ? 'none' : 'block';
};

function atualizar() {
  lista.innerHTML = "";

  const agrupado = {};

  carrinho.forEach(item => {
    if (!agrupado[item.nome]) {
      agrupado[item.nome] = { ...item, qtd: 1 };
    } else {
      agrupado[item.nome].qtd++;
    }
  });

  Object.values(agrupado).forEach(item => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${item.nome}<br>
      Qtd: ${item.qtd}<br>
      R$ ${(item.preco * item.qtd).toFixed(2)}<br>
      <button class="qtd-btn" onclick="alterarQtd('${item.nome}', -1)">-</button>
      <button class="qtd-btn" onclick="alterarQtd('${item.nome}', 1)">+</button>
    `;
    lista.appendChild(li);
  });

  contador.textContent = carrinho.length;
  document.getElementById("total").textContent = "Total: R$ " + total.toFixed(2);

  const formaPagamento = document.getElementById("pagamento").value;
  const parcelas = document.getElementById("parcelas").value;

  const listaProdutos = Object.values(agrupado)
    .map(i => `• ${i.nome} (x${i.qtd}) - R$ ${(i.preco * i.qtd).toFixed(2)}`)
    .join("\n");

  const msg = encodeURIComponent(
    "🛍️ Pedido - Beleza Pura\n\n" +
    listaProdutos +
    "\n\n💰 Total: R$ " + total.toFixed(2) +
    "\n💳 Pagamento: " + formaPagamento +
    (formaPagamento === "Cartão" ? ` (${parcelas}x)` : "")
  );

  whatsapp.href = "https://wa.me/5511948523462?text=" + msg;
}

function alterarQtd(nome, delta) {
  const index = carrinho.findIndex(i => i.nome === nome);

  if (index !== -1) {
    if (delta === 1) {
      carrinho.push(carrinho[index]);
      total += carrinho[index].preco;
    } else {
      total -= carrinho[index].preco;
      carrinho.splice(index, 1);
    }
  }

  atualizar();
}

const pagamentoSelect = document.getElementById("pagamento");
const parcelasBox = document.getElementById("parcelas-box");

pagamentoSelect.addEventListener("change", () => {
  parcelasBox.style.display = pagamentoSelect.value === "Cartão" ? "block" : "none";
});

fetch(url)
.then(r=>r.text())
.then(data=>{
  const json = JSON.parse(data.substr(47).slice(0,-2));
  const rows = json.table.rows;

  rows.sort((a,b)=> (a.c[3]?.v||0)-(b.c[3]?.v||0));

  rows.forEach(r=>{
    const nome = r.c[0]?.v || "";
    const foto = r.c[1]?.v || "";
    const preco = parseFloat(r.c[3]?.v)||0;

    const destaque = preco <= 50;

    const div = document.createElement("div");
    div.className = "produto";

    div.innerHTML = `
      ${destaque ? '<div class="selo">🔥 Oferta</div>' : ''}
      <img src="${foto}" alt="${nome}">
      <div class="nome">${nome}</div>
      <div class="preco">R$ ${preco.toFixed(2)}</div>
      <button class="botao-comprar adicionar">🛒 Adicionar e continuar comprando</button>
      <button class="botao-comprar comprar-direto">⚡ Comprar agora no WhatsApp</button>
    `;

    div.querySelector(".adicionar").onclick = () => {
      carrinho.push({nome, preco});
      total += preco;
      atualizar();
    };

    div.querySelector(".comprar-direto").onclick = () => {
      const msg = encodeURIComponent(
        "🛍️ Pedido - Beleza Pura\n\n" +
        `• ${nome} - R$ ${preco.toFixed(2)}` +
        "\n\n💳 Pagamento: a combinar"
      );

      window.open("https://wa.me/5511948523462?text=" + msg, "_blank");
    };

    document.getElementById("catalogo").appendChild(div);
  });
})
.catch(err => console.error("Erro:", err));
</script>

</body>
</html>
